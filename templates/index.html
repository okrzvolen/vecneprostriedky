<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>PDF do Excel Konvertor</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; background: #f4f7f6; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 400px; }
        select, input, button { width: 100%; margin: 10px 0; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        button { background: #28a745; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #218838; }
        .loader { display: none; text-align: center; color: #555; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Konvertor PDF dát</h2>
        <form action="/convert" method="post" enctype="multipart/form-data" id="uploadForm">
            <label>Vyberte Okresný úrad:</label>
            <select name="okres" required>
                {% for o in okresy %}
                <option value="{{ o }}">{{ o }}</option>
                {% endfor %}
            </select>
            
            <label>Nahrajte PDF:</label>
            <input type="file" name="pdf" accept=".pdf" required>
            
            <button type="submit" id="btnSubmit">Konvertovať PDF</button>
            <button type="button" style="background:#dc3545;" onclick="window.location.reload()">Reset aplikácie</button>
        </form>
        <div class="loader" id="loader">Spracovávam... Prosím čakajte.</div>
    </div>

    <script>
        document.getElementById('uploadForm').onsubmit = function() {
            document.getElementById('btnSubmit').disabled = true;
            document.getElementById('loader').style.display = 'block';
        };
    </script>
</body>
</html>
